# ============================================================
# DrawerDissect Configuration
# ============================================================

# ------------------------------------------------------------
# Deployment
# ------------------------------------------------------------
# Controls whether CV models are run via Roboflow (cloud) or
# locally using downloaded .pt weights.
#
# Options:
#   "roboflow" - use Roboflow API (default, requires API key)
#   "local"    - use local .pt weights via ultralytics YOLO

deployment: "roboflow"

# ------------------------------------------------------------
# API Keys 
# ------------------------------------------------------------
api_keys:
  anthropic: "ANTHROPIC_API_KEY" 
  roboflow: "ROBOFLOW_API_KEY"   # (not needed when deployment: local)

# ------------------------------------------------------------
# Claude (LLM for transcription steps)
# ------------------------------------------------------------
claude:
  model: "claude-sonnet-4-6"  # substitute with any claude model; price may vary
  max_tokens: 600  # default max tokens; increase for complicated tasks, decrease for simple ones

# ------------------------------------------------------------
# Roboflow  (used when deployment: "roboflow")
# ------------------------------------------------------------
roboflow:
  workspace: "field-museum" # FMNH workspace is default
  models:
    drawer:
      endpoint: "trayfinder-base" # obj detection, finds trays in drawers
      version: 6
      confidence: 70 # adjustable, set from 1-99 (higher # = greater threshold for predictions)
      overlap: 50    # adjustable, set from 1-99 (higher # = higher expected overlap between bounding boxes)
    tray:
      endpoint: "bugfinder-kdn9e"
      version: 19
      confidence: 57
      overlap: 50
    label:
      endpoint: "labelfinder"
      version: 10
      confidence: 5
      overlap: 50
    mask:
      endpoint: "bugmasker-all"
      version: 12
      confidence: 62
    pin:
      endpoint: "pinmasker"
      version: 6
      confidence: 13
    bugcleaner:
      endpoint: "bugcleaner"
      version: 3

# ------------------------------------------------------------
# Local Inference  (used when deployment: "local")
# ------------------------------------------------------------
local:
  weights_dir: "weights"
  device: "auto" # can force "cpu", "cuda", or "mps"
  models:
    drawer:
    tray:
    label:
    mask:
    pin:
    bugcleaner: # no weights for bugcleaner available currently

traycontext_settings:
  bugcleaner_confidence_threshold: 95
  max_tokens: 12000
  include_tray_image: true # can exclude to save tokens
  max_specimens_per_batch: 20

# ------------------------------------------------------------
# Processing toggles
# ------------------------------------------------------------
processing:
  measurement_visualizations: "off"  # "on", "off", or "rand_sample" (max 20 random visualizations)
  transcribe_barcodes: false         # set to true for tray-level barcodes
  transcribe_geocodes: false         # set to true for tray-level geocodes
  transcribe_taxonomy: false         # set to true for taxonomic label transcription
  transcribe_specimens: false        # set to true for specimen label transcription helper

# ------------------------------------------------------------
# Prompts
# ------------------------------------------------------------
prompts:
  barcode: # prompt for transcribing FMNH-style unit tray barcodes
    system: |
      You are a barcode reading tool. You should output only the numbers found in the image.
      The barcode is always five digits long.
      If no valid barcode is found, output 'none'.
    user: |
      Read the barcode number. Output only the code, no explanations.

  geocode: # prompt for recognizing 3-letter geocodes
    system: |
      You are a geocode recognition tool for natural history specimens.
      Your task is to identify the 3-letter geocode visible in the image.

      The geocode is always a 3-letter code (all capital letters):
      - "NEO"
      - "PAL"
      - "NEA"
      - "AFR"
      - "ORI"
      - "AUS"
      - "PAC"

      Output only the 3-letter geocode. If no valid 3-letter geocode is visible
      or if the text is unclear, output 'UNK' (Unknown).
    user: |
      Identify the 3-letter geocode visible in this image. Output only the code (e.g., NEO, PAL), no explanations.

  taxonomy: # prompt for transcribing and organizing taxonomic IDs
    system: |
      You are a taxonomic label transcription tool specializing in natural
      history specimens. Your task is to:
      1. Provide a complete transcription of the entire label, which may be handwritten
      2. Extract the taxonomic name, including any genus, subgenus, species,
         and subspecies information
      3. If ONLY higher order taxonomic information is available (family -dae, tribe -ini, subfamily -nae), report this in 'taxonomy'
      4. Extract the taxonomic authority (author and/or year)

      For missing elements, output 'none'. Format your response as a structured
      dictionary with these three keys:
      {
        'full_transcription': 'complete text as shown',
        'taxonomy': 'only taxonomic name (Genus (Subgenus) species subspecies) OR higher-order taxonomy',
        'authority': 'author, year'
      }
    user: |
      Transcribe this taxonomic label, preserving the exact text and extracting
      the taxonomic name and authority. Output only the dictionary, no explanations.
      
  traycontext:
    system: |
      You are a transcription tool for pinned insect specimen labels in a natural
      history collection. You will receive:
        1. TRAY HEADER CONTEXT: geocode, taxonomy, and/or barcode from the tray header.
        2. A TRAY OVERVIEW IMAGE: a downsized photo of the full unit tray.
        3. INDIVIDUAL SPECIMEN CROPS: separate close-up images of each specimen,
           labeled by ID. Use these to read the label text.
 
      Labels are small pieces of paper pinned beneath or beside each insect. They
      are often handwritten, rotated 90 degrees, partially obscured, and very small.
      There may be multiple labels per specimen (locality, determination, collection).
 
      When using the TRAY OVERVIEW IMAGE:
      - Use it to see how specimens are arranged in rows. Specimens in the same
        row often (but not always) share a collecting event.
      - Notice label SIZE and COLOR patterns across specimens. A block of 8
        specimens with identical small white labels next to 4 specimens with
        larger yellowed labels suggests at least two different collecting events.
      - Labels are often ROTATED 90 degrees and pinned beneath or beside the
        specimen. The overview helps you see which labels belong to which specimen
        when crops are ambiguous.
 
      == STEP 1: TRANSCRIBE EACH SPECIMEN INDEPENDENTLY ==
 
      For EVERY specimen, examine its crop image carefully and transcribe ALL visible
      label text into a "verbatim_text" field.
        - Preserve original spelling, punctuation, abbreviations, and line breaks.
        - Use [?] for single unclear characters, [illeg.] for unreadable words.
        - If multiple labels are visible, separate them with " | ".
        - If no text is visible at all, set verbatim_text to "".
 
      CRITICAL: During transcription, read each specimen's labels independently.
      Do NOT copy or assume text from one specimen onto another. Many labels in
      the same tray LOOK similar but say different things. Transcribe what you
      actually see on each crop — grouping comes later in Step 3.
 
      == STEP 2: PARSE EACH SPECIMEN'S TEXT ==
 
      For each specimen, parse its transcribed text into DarwinCore fields.
      Do this BEFORE grouping — each specimen gets its own parsed fields first.
 
      Parsing rules:
      - ONLY fill in fields where the text provides clear, direct evidence.
      - DO NOT guess or infer geography from ambiguous place names.
        Example: "Charleston" with no state → put in "municipality" only.
      - US state abbreviations on specimen labels are typically two letters
        without periods: CA, OR, WA, ID, MT, CO, IN, IL, etc. Be cautious
        with period-abbreviated codes like "N.M." — these may be
        state abbreviations OR parts of institution names. Look for surrounding
        context to decide.
      - These are NOT locations:
          "Col." or "Coll." = collector (not Colorado)
          "Det." = determiner/identifier (not Detroit)
          "FMNH" or "Field Museum" = Field Museum of Natural History (institution)
          "C.N.H.M." or "CNHM" = Chicago Natural History Museum (institution)
          "Mus.", "Museum" = institution, not a place
      - Dates preceded by "det." or "Det." are DETERMINATION dates (when the
        specimen was identified), NOT collection dates. Only use dates from
        locality/collecting labels, not from determination labels.
      - IGNORE taxonomic names — taxonomy is handled separately.
      - IGNORE catalog numbers, accession numbers, barcodes.
      - Conflicting state fragments: if a label contains two different state
        names or abbreviations that cannot both be correct (e.g. "IDAHO" and
        "Utah" on the same label), do NOT pick one — leave stateProvince empty
        and add a "conflicting_info" flag. Only populate stateProvince when a
        single state is unambiguously indicated.
      - Geographic context overrides isolated abbreviations: if a city or county
        name on the label strongly implies a particular state, do not let an
        isolated abbreviation contradict it. Example: "San Diego" is a strong
        California signal — if "Ariz." also appears, it is more likely part of
        a compound place name (e.g. Anza-Borrego) than a state identifier.
        Put such ambiguous abbreviations in verbatimLocality, not stateProvince.
      - Uncertain fragments ([?]) must not assert county: a place name fragment
        marked with [?] (e.g. "Riv[erside?]") is not reliable enough to
        populate county. Leave county empty and put the fragment in
        verbatimLocality only.
      - Do not expand partial name fragments into full city names: if a fragment
        like "Ana" or "Anna" appears on a label, do not assume it means the
        city of Santa Ana. In a Southern California context "Ana" most likely
        refers to the Santa Ana River — put it in locality, not municipality.
        Only populate municipality when a city name is clearly and fully legible.
      - DarwinCore fields must contain ONLY clean values. Never put [?] or
        [illegible] in DarwinCore fields, but feel free to fill in fields if the string can be understood despite fragmentation, e.g. "L[ake?] Elsinore = Lake Elsinore"
 
      == STEP 3: GROUP BASED ON EVIDENCE ==
 
      After transcribing and parsing each specimen, compare your verbatim_text
      outputs across specimens. Look for recurring fragments — if 10 specimens
      all have pieces of "IND. Porter Co." or "POLAND: Kam[?] woj.", these are
      almost certainly the same collecting event. The fragments don't need to be
      identical; they need to be CONSISTENT.
 
      GROUPING RULES:
      - Group on parsed DarwinCore fields: if multiple specimens parsed to the
        same country + state, or the same country + locality fragments, group them
        as match_type="similar". Use the most complete verbatim_text and the most
        detailed parsed fields from the group.
      - Use BOTH visual and textual cues for grouping. Similar-looking labels
        (same paper, handwriting style, label size) combined with consistent
        text fragments (same place names, dates, abbreviations) are strong
        evidence of a shared collecting event.
      - When specimens clearly come from different locations (one says "Idaho" and
        another says "Oregon"), keep them in separate groups even if they're adjacent.
      - match_type values:
          "identical" = you can confirm the labels contain the same text
          "similar"   = labels share the same country AND state/province, OR share
                        the same country AND a recurring locality/municipality fragment.
                        Same country alone is NOT sufficient — 50 US specimens do not
                        share a collecting event.
          "unique"    = no confirmed overlap with other specimens
 
      == CROSS-REFERENCE ==
      Use the tray header context to sanity-check your results:
      - If the geocode is NEA (Nearctic = US, Canada, northern Mexico), a label
        reading "Argentina" is suspect — add a flag "geocode_mismatch".
      - Geocode regions:
          NEA = Nearctic (US, Canada, northern Mexico)
          NEO = Neotropical (southern Mexico, Central/South America, Caribbean)
          PAL = Palearctic (Europe, North Africa, temperate/northern Asia)
          AFR = Afrotropical (sub-Saharan Africa, Madagascar)
          ORI = Oriental (tropical South/Southeast Asia)
          AUS = Australasian (Australia, New Guinea, New Zealand)
          PAC = Pacific (oceanic Pacific islands)
      - Mexico straddles NEA/NEO. Indonesia straddles ORI/AUS. Egypt straddles
        PAL/AFR. These borderline cases should NOT be flagged.
 
      == OUTPUT FORMAT ==
      Return ONLY a JSON object. No other text before or after.
      {
        "groups": [
          {
            "label_group": 1,
            "specimen_ids": ["<tray_name>_spec_001"],
            "match_type": "unique",
            "verbatim_text": "",
            "country": "",
            "stateProvince": "",
            "county": "",
            "municipality": "",
            "verbatimLocality": "",
            "locality": "",
            "waterBody": "",
            "islandGroup": "",
            "island": "",
            "verbatimElevation": "",
            "verbatimCoordinates": "",
            "habitat": "",
            "samplingProtocol": "",
            "collector": "",
            "verbatimEventDate": "",
            "identifiedBy": "",
            "possibleName": "",
            "flags": []
          }
        ]
      }
 
      == FIELD DEFINITIONS ==
      - label_group: integer, starting at 1
      - specimen_ids: list of specimen ID strings
      - match_type: "identical", "similar", or "unique"
      - verbatim_text: complete raw label text from the clearest specimen in the group
      - country, stateProvince, county (name only, e.g. "Jefferson", NOT "Jefferson County"): administrative geography
      - municipality: city or town (e.g. "Needles", "Pentwater", "Salt Lake City")
      - verbatimLocality: the place description EXACTLY as written on the label,
        preserving original spelling, abbreviations, and punctuation
        (e.g. "2mi. NW of Fox Lake, rt. 12", "Satpura H[ills?]", "Formosa")
      - locality: the PRIMARY catch-all field for any named place, natural feature,
        water body, or directional description more specific than municipality.
        (e.g. "Indiana Dunes State Park", "Miller Beach", "2 mi NW of Fox Lake",
        "Chewaucan River", "Mt. Shasta", "Lake Elsinore shore")
        CRITICAL: Do NOT restate information already in country, stateProvince,
        county, or municipality. "Pullman, Washington" is wrong — that's just
        restating municipality + stateProvince. Leave locality empty if the label
        only names a city or higher-level geography.
      - waterBody, islandGroup, island: only populate when the water body or island
        IS the entire location (nothing more specific on the label). If any other
        locality detail is present alongside it, put everything in locality instead.
        When in doubt, use locality.
      - verbatimElevation: elevation exactly as written on the label (e.g. "1200 ft",
        "3500 m", "ca. 800m")
      - habitat: habitat description (e.g. "oak savanna", "sandy beach", "under bark")
      - samplingProtocol: collection method if mentioned (e.g. "malaise trap",
        "UV light trap", "hand collected", "under bark of log")
      - collector: person who collected (from "Col.", "Coll.", "leg.", etc.)
      - verbatimEventDate: the date exactly as written on the label, in any format
        (e.g. "17IV1934", "spring 1910", "Marzo 2002", "05-1970").
        Only collection dates, NOT determination dates.
      - identifiedBy: person who identified the specimen (from "det.", "Det." labels)
      - possibleName: any name or initials that are clearly present on a label but
        cannot be confidently attributed to collector or identifier — either because
        the role label ("det.", "leg.", "Col.") is absent, illegible, or ambiguous.
        Capture both bare initials (e.g. "R.F.", "M.H.") and full names where the
        role is uncertain (e.g. "[det.?] Freitag"). If the role IS clear, use
        collector or identifiedBy instead and leave this empty.
      - verbatimCoordinates: coordinates exactly as written on the label, if present
        (e.g. "41 05 54S 121 05 34W", "17T 630000 4833400"). Leave empty if absent.
      - flags: list of strings. Use only when applicable:
          "conflicting_info"  — labels on the same specimen give contradictory data
                                (e.g. two locality labels with different countries)
          "geocode_mismatch" — parsed country conflicts with the tray geocode
 
      == RULES ==
      - Every specimen must appear in exactly one group.
      - A specimen with a unique label is a group of one (match_type: "unique").
      - Leave DarwinCore fields empty (not "none") when information is absent.
      - If you cannot read a handwritten label at all, still include it as a unique
        group with empty geography fields and empty verbatimCoordinates.
    user: |
      Tray header context (use this to sanity-check your results):
      {tray_context}
 
      Specimens in this tray: {specimen_ids}
 
      Follow these steps in order:
      1. TRANSCRIBE each specimen's labels independently — read what YOU can see
         on each crop, do not copy text from other specimens
      2. PARSE each specimen's text into DarwinCore fields individually
      3. Compare your verbatim outputs and parsed fields across specimens, then
         group those with consistent location fragments
 
      Return only the JSON object, no other text.

# ------------------------------------------------------------
# Directories
# ------------------------------------------------------------
directories:
  unsorted: "drawers/unsorted"
  drawer_subdirs:
    fullsize: "fullsize"
    resized: "resized"
    coordinates: "resized/coordinates"
    trays: "trays"
    guides: "guides"
    resized_trays: "resized_trays"
    resized_trays_coordinates: "resized_trays/coordinates"
    label_coordinates: "resized_trays/label_coordinates"
    labels: "labels"
    specimens: "specimens"
    mask_coordinates: "masks/mask_coordinates"
    mask_png: "masks/mask_png"
    measurements: "measurements"
    no_background: "masks/no_background"
    pin_coordinates: "masks/pin_coords"
    full_masks: "masks/full_masks"
    transparencies: "transparencies"
    whitebg_specimens: "whitebg_specimens"
    tray_level: "transcriptions/tray_labels"
    tray_context: "transcriptions/tray_context"
    data: "data"

# ------------------------------------------------------------
# Resources
# ------------------------------------------------------------
resources:
  memory:
    sequential: false  # process in parallel by default
    max_workers: null  # null = automatic based on CPU
    batch_size: null   # null = process all at once

    # Step-specific overrides (only for steps that need special handling)
    step_overrides:
      resize_drawers:
        sequential: false
        batch_size: null
      crop_trays:
        sequential: true
        batch_size: 1
      outline_specimens:
        sequential: false
        max_workers: null
      outline_pins:
        sequential: false
        max_workers: null
      create_transparency:
        sequential: false
        max_workers: 40
